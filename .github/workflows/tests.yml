name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Match pyproject's requires-python = ">=3.10". 3.13/3.14 also guard
        # the published container runtime (Dockerfile's python:*-slim base),
        # which CI does not otherwise exercise on PRs.
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      # The engine + offline heuristic have zero third-party deps, so there is
      # nothing to install. The optional memory-agent feature is not installed;
      # its tests skip cleanly (see tests/test_memory.py).
      - name: Run the test suite
        run: python -m unittest discover -s tests -v
