name: neural-train-battery

# The #130 milestone runner: train a developmental brain IN the real engine
# (running --neural towns is the training), domain-randomized across a training
# seed pool held DISJOINT from the battery's held-out seeds (42-46), checkpoint
# once grounding is stable on a fixed held-in world, then run the acceptance
# battery on the held-out worlds and publish battery.json. This exists because
# the brain repo's environment cannot reach this engine, and mirror-scale
# checkpoints are shape-incompatible with the real build_brain — so real-config
# training must happen where the engine lives.

on:
  workflow_dispatch:
    inputs:
      llm_model_agi_ref:
        description: pip spec for the brain package (agent.adapters.emergence)
        required: true
        default: "git+https://github.com/nori1234/llm_model_agi@main"
      torch_spec:
        description: pip spec for torch (CPU wheel is fine)
        required: false
        default: "torch"
      agent_agi_ref:
        description: >-
          pip spec for the memory organ (agent_agi's DeterministicMemoryStore).
          Needed whenever hparams set memory="episodic" (v0 recording OR v1
          memory_into_policy): AgentAgiEpisodicMemory imports it lazily, so a
          missing install shows up only as a silent heuristic fallback at
          episode 1 (engine run #22). Installed unconditionally — it is inert
          for the default memory="null" runs.
        required: false
        default: "git+https://github.com/nori1234/agent_agi@main"
      episodes:
        description: max training episodes
        required: false
        default: "60"
      days:
        description: days per training episode
        required: false
        default: "20"
      agents:
        description: agents per town
        required: false
        default: "6"
      seed:
        description: >-
          First seed of the TRAINING pool (domain-randomized, disjoint from the
          battery's held-out seeds 42-46 — the script asserts this at startup).
        required: false
        default: "1000"
      pool_size:
        description: >-
          Number of distinct world seeds to domain-randomize training over
          (episodes rotate through this pool). A single training world can
          converge (is_stable) without generalizing to held-out worlds — this
          is the fix for that, not a hparam.
        required: false
        default: "12"
      probe_every:
        description: probe cadence (episodes)
        required: false
        default: "5"
      window:
        description: is_stable window (probes)
        required: false
        default: "3"
      sandbox:
        description: >-
          train + measure in the minimal sandbox (dense behaviour → conclusive;
          demurrage only). "true" or "false".
        required: false
        default: "false"
      complexity_level:
        description: >-
          Step up the sandbox's complexity ladder (0..3; only applies with
          sandbox=true). 0 is the original minimal sandbox; each further
          level adds a nested facility tier (market/workshop/forest, then
          plaza/town_hall, then police/hospital). Tests whether the world
          itself being too information-poor gates grounding (see
          docs/GROUNDING.md).
        required: false
        default: "0"
      sole_banker:
        description: >-
          S6 task redesign (only applies with sandbox=true): restrict deposits
          to the staffed banker, cutting the agent-to-agent deposit-chain claim
          ratchet that made depositing dominate demurrage (advantage_cf -127).
          On the redesigned task the deposit-only oracle's advantage is
          slightly positive (+0.21, +0.56 sigma) — the first task where
          grounding pays (docs/runs/deposit-oracle-redesign-1). Train/eval-
          MATCHED, like complexity_level. "true" or "false".
        required: false
        default: "false"
      demurrage_per_day:
        description: >-
          Run #15 contingency-margin dial (cf world only; 0.15 = canonical,
          byte-identical). Widens the cf-side contingency margin
          (== advantage_cf) a learner is paid for regime-contingency; the
          control-side pull is structurally untouched. Train/eval-MATCHED.
          Calibrated via contingency-calib-1 against the pre-registered band
          (docs/proposals/run15-contingency-margin.md) — never tuned against
          training outcomes.
        required: false
        default: "0.15"
      stable_income:
        description: >-
          C1 reflex-impossible task (sandbox only): reset each saver's spendable
          money to this fixed target each day, so the deposit decision is faced at
          a regime-INVARIANT money level and the blind wealth-threshold reflex
          loses its handle (floor G1->0, G2->0 — verified torch-free). The regime
          becomes inferable ONLY from the banked deposit's shrinkage history, so
          ANY positive G2 is genuine grounding. 0 = off (byte-identical).
          Train/eval-MATCHED. See docs/runs/metric-trajectory-confound-1.
        required: false
        default: "0"
      eval_demurrage_per_day:
        description: >-
          TRANSFER test: evaluate the trained brain at a DIFFERENT demurrage
          severity than training (empty = same as demurrage_per_day). A memorised
          mechanism transfers poorly to an unseen severity; a genuinely inferring
          one adapts. AGI-relevant generalisation probe.
        required: false
        default: ""
      felt_delta:
        description: >-
          M2 (sandbox): surface the felt exogenous deposit yield (the
          demurrage/interest applied to my savings last day) in the observation,
          so the policy can REACT to the consequence instead of inferring the
          hidden regime from recall (docs/runs/grid-41-48). "true" or "false".
          Off by default. Train/eval-MATCHED.
        required: false
        default: "false"
      grounded_teacher:
        description: >-
          issue #10(c) diagnostic (only applies with sandbox=true): use the
          regime-AWARE grounded heuristic as the TEACHER (deposits in control,
          holds under demurrage), told the ground-truth regime each episode.
          Measures the teaching-channel ceiling — can grounding transmit via BC
          when the teacher has it. The teacher cheats by construction (knows the
          hidden regime): pipeline validation, NOT a grounding proof. Do NOT
          anneal BC with this. "true" or "false".
        required: false
        default: "false"
      status_layer:
        description: >-
          Enable the status/esteem layer during TRAINING episodes (a
          competing reward objective). Leave empty for the existing default
          (on for full town, off for sandbox); set "true"/"false" to override
          either way and build the sandbox x status 2x2 factorial that
          isolates world size from this axis.
        required: false
        default: ""
      regime_block_size:
        description: >-
          Only applies with sandbox=true: hold the control/counterfactual
          regime fixed for this many CONSECUTIVE episodes before switching,
          instead of alternating every episode (default 1). The brain side
          confirmed their deployed policy is memoryless step-to-step;
          switching every episode may simply dilute the per-regime gradient
          signal (see docs/GROUNDING.md).
        required: false
        default: "1"
      floor_rollouts:
        description: >-
          report an additional ensemble-mean floor read (over this many
          independent worlds) alongside the canonical world-matched floor,
          purely as a cross-check -- never changes excess/verdict (see the
          floor-confound note in the script's docstring).
        required: false
        default: "1"
      hparams:
        description: >-
          JSON dict forwarded to build_brain — the brain side's late-training-
          oscillation damper (batch_every/lr/lr_min/lr_decay_steps/
          entropy_weight/self_attempt_base/bc_weight), e.g.
          {"batch_every": 64, "lr_decay_steps": 4000}. Empty = their defaults.
        required: false
        default: ""
      preflight_only:
        description: >-
          Print the estimated per-rule conclusive yield against BATTERY_SEEDS
          (heuristic only -- no torch, no training, seconds not hours) and
          exit. Run this first when in doubt whether a rule (feast/lie are
          sparser than deposit) will power floor_regression before spending
          training compute on a run that would come back UNDETERMINED for it
          regardless of what the brain does. "true" or "false".
        required: false
        default: "false"

permissions:
  contents: read

jobs:
  train-and-battery:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install the engine (this repo)
        run: pip install -e .

      - name: Auth for the private brain repo
        env:
          LLM_TOKEN: ${{ secrets.LLM_MODEL_AGI_TOKEN }}
        run: |
          if [ -z "$LLM_TOKEN" ]; then
            echo "::error::LLM_MODEL_AGI_TOKEN secret is empty — set it in the repo's Actions secrets."
            exit 1
          fi
          git config --global url."https://x-access-token:${LLM_TOKEN}@github.com/".insteadOf "https://github.com/"

      - name: Install torch + the developmental-brain package (+ memory organ if needed)
        env:
          TORCH_SPEC: ${{ inputs.torch_spec }}
          LLM_MODEL_AGI_REF: ${{ inputs.llm_model_agi_ref }}
          AGENT_AGI_REF: ${{ inputs.agent_agi_ref }}
          HPARAMS: ${{ inputs.hparams }}
        run: |
          pip install "$TORCH_SPEC"
          pip install "$LLM_MODEL_AGI_REF"
          # The memory organ (agent_agi) is ONLY needed when hparams request
          # episodic memory — it is imported lazily inside decide(), so a
          # memory="null" run (e.g. A1) never touches it. It also lives in a
          # separate private repo that LLM_MODEL_AGI_TOKEN may not be scoped to
          # (a 403 clone here took down BOTH runs at install, run #23/#24), so
          # only install it when the run actually uses it. When it IS needed, the
          # next step's guard fails fast and loud if the install didn't work.
          NEED_MEM=$(python - <<'PY'
          import json, os
          try:
              hp = json.loads(os.environ.get("HPARAMS", "") or "{}")
          except Exception:
              hp = {}
          print("yes" if hp.get("memory", "null") == "episodic" else "no")
          PY
          )
          if [ "$NEED_MEM" = "yes" ]; then
            echo "hparams request episodic memory — installing the memory organ."
            pip install "$AGENT_AGI_REF"
          else
            echo "memory='null' — skipping the agent_agi install (not needed)."
          fi

      - name: Guard — the adapter must actually import (a fallback run trains nothing)
        run: |
          python - <<'PY'
          import importlib.util, sys
          if importlib.util.find_spec("agent.adapters.emergence") is None:
              sys.exit("agent.adapters.emergence did not install — training would "
                       "silently fall back to the heuristic. Check llm_model_agi_ref.")
          print("adapter importable — training for real.")
          PY

      - name: Guard — confirm the observation tokenizer is v2 (not a stale pin)
        run: |
          python - <<'PY'
          import sys
          from agent.adapters.emergence import build_brain
          brain = build_brain("guardian", None, None)
          version = getattr(getattr(brain, "tokenize", None), "version",
                            "PRE-v2 CODE (= v1!)")
          print(f"[guard] obs tokenizer version: {version}")
          if version != "v2":
              sys.exit(f"[fatal] expected obs tokenizer v2, got {version!r} — "
                       "llm_model_agi_ref is pinned before the v2 fix (commit "
                       "9bc016c). v1 collapses observation structure into opaque "
                       "hashes (see docs/GROUNDING.md) — measuring with it silently "
                       "invalidates any grounding result. Update llm_model_agi_ref "
                       "to a ref that includes the fix and re-dispatch.")
          PY

      - name: Guard — if memory is requested, the organ must actually import
        # AgentAgiEpisodicMemory imports agent_agi lazily inside decide(), so a
        # missing organ surfaces only as a silent heuristic fallback at episode 1
        # (run #22). Fail fast and loud here instead, but ONLY when the run
        # actually asks for episodic memory (default null needs nothing).
        env:
          HPARAMS: ${{ inputs.hparams }}
        run: |
          python - <<'PY'
          import json, os, sys
          raw = os.environ.get("HPARAMS", "") or "{}"
          try:
              hp = json.loads(raw)
          except Exception:
              hp = {}
          if hp.get("memory", "null") == "episodic":
              try:
                  from agent.memory import AgentAgiEpisodicMemory
                  AgentAgiEpisodicMemory()   # forces the agent_agi import
              except Exception as exc:
                  sys.exit(f"[fatal] hparams request memory='episodic' but the "
                           f"memory organ did not import: {exc!r}. Install "
                           "agent_agi (agent_agi_ref) — otherwise training "
                           "silently falls back to the heuristic at episode 1.")
              print("memory organ importable — episodic memory for real.")
          else:
              print("memory='null' — no organ needed.")
          PY

      - name: Train in the real engine, then run the acceptance battery
        # Every free-text input goes through an env var, not direct ${{ }}
        # interpolation into the shell command: GitHub substitutes ${{ }}
        # as raw text BEFORE bash parses the line, so a value containing a
        # single quote (most plausible for --hparams, which is a JSON blob)
        # could break out of its quoting and inject arbitrary shell commands.
        # An intermediate env var sidesteps this -- "$VAR" expands to the
        # literal value, quotes and all, without bash re-parsing it as
        # syntax. workflow_dispatch-only (no external trigger can supply
        # these inputs), so the practical exposure is low, but the fix is
        # cheap and this is the standard mitigation GitHub's own docs
        # recommend for exactly this pattern.
        env:
          EPISODES: ${{ inputs.episodes }}
          DAYS: ${{ inputs.days }}
          AGENTS: ${{ inputs.agents }}
          SEED: ${{ inputs.seed }}
          POOL_SIZE: ${{ inputs.pool_size }}
          PROBE_EVERY: ${{ inputs.probe_every }}
          WINDOW: ${{ inputs.window }}
          COMPLEXITY_LEVEL: ${{ inputs.complexity_level }}
          DEMURRAGE_PER_DAY: ${{ inputs.demurrage_per_day }}
          STABLE_INCOME: ${{ inputs.stable_income }}
          REGIME_BLOCK_SIZE: ${{ inputs.regime_block_size }}
          FLOOR_ROLLOUTS: ${{ inputs.floor_rollouts }}
          HPARAMS: ${{ inputs.hparams }}
        run: |
          python scripts/train_neural_grounding.py \
            --episodes "$EPISODES" \
            --days "$DAYS" \
            --agents "$AGENTS" \
            --seed "$SEED" \
            --pool-size "$POOL_SIZE" \
            --probe-every "$PROBE_EVERY" \
            --window "$WINDOW" \
            ${{ inputs.sandbox == 'true' && '--sandbox' || '' }} \
            ${{ inputs.sole_banker == 'true' && '--sole-banker' || '' }} \
            ${{ inputs.felt_delta == 'true' && '--felt-delta' || '' }} \
            ${{ inputs.grounded_teacher == 'true' && '--grounded-teacher' || '' }} \
            --complexity-level "$COMPLEXITY_LEVEL" \
            --demurrage-per-day "$DEMURRAGE_PER_DAY" \
            ${{ inputs.eval_demurrage_per_day != '' && format('--eval-demurrage-per-day {0}', inputs.eval_demurrage_per_day) || '' }} \
            --stable-income "$STABLE_INCOME" \
            ${{ inputs.status_layer == 'true' && '--status' || '' }} \
            ${{ inputs.status_layer == 'false' && '--no-status' || '' }} \
            --regime-block-size "$REGIME_BLOCK_SIZE" \
            --floor-rollouts "$FLOOR_ROLLOUTS" \
            ${{ inputs.preflight_only == 'true' && '--preflight-only' || '' }} \
            --hparams "$HPARAMS" \
            --out grounding_out

      - name: Publish the battery result to the job summary
        if: always()
        run: |
          if [ -f grounding_out/battery.json ]; then
            echo '## #130 acceptance battery' >> "$GITHUB_STEP_SUMMARY"
            echo '```json' >> "$GITHUB_STEP_SUMMARY"
            cat grounding_out/battery.json >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          else
            echo 'battery.json was not produced (training aborted?)' >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload artifacts (checkpoint, monitors, battery)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: grounding-battery-${{ github.run_number }}
          path: grounding_out/
          if-no-files-found: warn
