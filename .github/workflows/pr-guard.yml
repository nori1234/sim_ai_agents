name: pr-guard

# Two cheap sanity gates on every PR:
#
# 1. Stale base — a branch that forked before commits already on the base.
#    Merging it can silently *revert* merged work (it happened once: a UI branch
#    on an older main would have un-deleted a file and dropped a test). Catch it
#    by requiring the base tip to be an ancestor of the PR head.
#
# 2. Empty diff — the PR changes nothing vs the base. This catches the *other*
#    failure that bit us: a botched local rebase/cherry-pick that silently lost
#    the commit and left the branch sitting exactly on main (so check #1 sees it
#    as "up to date" and waves it through). No diff => something went wrong.
on:
  pull_request:

jobs:
  up-to-date:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Require the branch to include the latest base
        env:
          BASE: ${{ github.base_ref }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          set -e
          git fetch --no-tags origin "$BASE"
          git fetch --no-tags origin "$HEAD_REF" || true
          if git merge-base --is-ancestor "origin/$BASE" "$HEAD_SHA"; then
            echo "OK: the branch includes the latest origin/$BASE."
          else
            behind=$(git rev-list --count "$HEAD_SHA..origin/$BASE")
            echo "::error::Stale base — this branch is missing $behind commit(s) from origin/$BASE."
            echo "Merging it could revert already-merged work. Rebase onto the latest base and force-push:"
            echo "    git fetch origin $BASE && git rebase origin/$BASE && git push --force-with-lease"
            exit 1
          fi
      - name: Reject an empty diff (lost commit / wrong branch)
        env:
          BASE: ${{ github.base_ref }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -e
          git fetch --no-tags origin "$BASE"
          if git diff --quiet "origin/$BASE...$HEAD_SHA"; then
            echo "::error::This PR has no changes vs origin/$BASE."
            echo "That usually means a commit was lost in a rebase/cherry-pick, or the"
            echo "wrong branch was pushed. Re-check the branch (the work may be dangling"
            echo "in 'git reflog') before merging."
            exit 1
          fi
          echo "OK: the PR has a non-empty diff vs origin/$BASE."
