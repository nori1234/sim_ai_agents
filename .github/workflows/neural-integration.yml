name: neural-integration

# The engine⇄developmental-brain round-trip contract (tests/test_neural_contract.py
# :: TestRoundTripContract) can only run where the [neural] extra is installed —
# torch + the external llm_model_agi package, which the normal `tests` workflow
# deliberately omits (there the round-trip skips). This manually-triggered job is
# the shared green-check both teams agreed on: it installs the brain package, then
# runs the contract, and FAILS LOUDLY if the adapter can't even be imported (so a
# skipped test never masquerades as a pass).

on:
  workflow_dispatch:
    inputs:
      llm_model_agi_ref:
        description: >-
          pip install spec for the brain package providing agent.adapters.emergence
          (e.g. a git ref: git+https://github.com/nori1234/llm_model_agi@<branch>,
          or a PyPI name). The sibling repo is not assumed to be on PyPI, so pass
          the source explicitly.
        required: true
        default: "git+https://github.com/nori1234/llm_model_agi@claude/custom-llm-model-qhtfxd"
      torch_spec:
        description: "pip install spec for torch (CPU wheel is fine)"
        required: false
        default: "torch"

jobs:
  round-trip:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install the engine (this repo)
        run: pip install -e .

      # llm_model_agi is private, so the runner cannot clone it anonymously.
      # Rewrite github.com URLs to use a fine-grained PAT (Contents:read), stored
      # as the LLM_MODEL_AGI_TOKEN secret. The token is not echoed to logs, and the
      # ref input below stays a plain https git+ URL.
      - name: Auth for the private brain repo
        env:
          LLM_TOKEN: ${{ secrets.LLM_MODEL_AGI_TOKEN }}
        run: |
          if [ -z "$LLM_TOKEN" ]; then
            echo "::error::LLM_MODEL_AGI_TOKEN secret is empty — set it in the repo's Actions secrets."
            exit 1
          fi
          git config --global url."https://x-access-token:${LLM_TOKEN}@github.com/".insteadOf "https://github.com/"

      - name: Install torch + the developmental-brain package
        # Routed through env vars, not direct ${{ }} interpolation into the
        # shell command: GitHub substitutes ${{ }} as raw text before bash
        # parses the line, so a pip-spec value containing a quote could
        # break out and inject shell commands. workflow_dispatch-only (no
        # external trigger can supply these inputs), so exposure is low,
        # but this is GitHub's own recommended mitigation for the pattern.
        env:
          TORCH_SPEC: ${{ inputs.torch_spec }}
          LLM_MODEL_AGI_REF: ${{ inputs.llm_model_agi_ref }}
        run: |
          pip install "$TORCH_SPEC"
          pip install "$LLM_MODEL_AGI_REF"

      - name: Guard — the adapter must actually import (a skip is NOT a pass)
        run: |
          python - <<'PY'
          import importlib.util, sys
          spec = importlib.util.find_spec("agent.adapters.emergence")
          if spec is None:
              sys.exit("agent.adapters.emergence did not install — the round-trip "
                       "would skip and falsely pass. Check llm_model_agi_ref.")
          print("agent.adapters.emergence importable — running the round-trip.")
          PY

      - name: Run the round-trip contract (and the always-on drift guards)
        run: python -m unittest tests.test_neural_contract -v
