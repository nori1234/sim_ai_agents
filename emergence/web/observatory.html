<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Emergence World — Observatory</title>
<style>
  :root { --bg:#0e1116; --panel:#161b22; --line:#272e38; --ink:#e6edf3; --dim:#8b98a5;
          --guardian:#4aa3ff; --philosopher:#f0b429; --idealist:#3fb950; --predator:#f85149; }
  * { box-sizing: border-box; }
  body { margin:0; font:15px/1.6 system-ui,-apple-system,"Segoe UI","Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif;
         background:var(--bg); color:var(--ink); }
  header { display:flex; gap:.6rem; align-items:center; flex-wrap:wrap;
           padding:.6rem .9rem; background:var(--panel); border-bottom:1px solid var(--line); }
  header h1 { font-size:15px; margin:0 .6rem 0 0; font-weight:700; }
  select, input, button { font:inherit; color:var(--ink); background:#0d1117;
           border:1px solid var(--line); border-radius:6px; padding:.3rem .5rem; }
  input[type=number] { width:5rem; } button { cursor:pointer; }
  button:hover { border-color:#3d4350; } button.primary { background:#1f6feb; border-color:#1f6feb; }
  #status { margin-left:auto; color:var(--dim); font-size:13px; }
  #lang { color:var(--dim); }
  /* The town is the hero; the chronicle / possessed life read on the right. */
  main { display:grid; grid-template-columns: 1.55fr 1fr; gap:1px; background:var(--line);
         height: calc(100vh - 52px); }
  .side { background:var(--panel); display:flex; flex-direction:column; min-height:0; }
  #stage { position:relative; flex:1; min-height:0;
           background:
             radial-gradient(900px 600px at 50% 0%, #12202a 0%, #0d1620 55%, #0a121a 100%); }
  #town { display:block; width:100%; height:100%; cursor:grab; }
  #town.dragging { cursor:grabbing; }
  .tip { position:fixed; z-index:20; pointer-events:none; background:#0d1117ee;
         border:1px solid var(--line); border-radius:6px; padding:.3rem .55rem;
         font-size:12px; color:var(--ink); box-shadow:0 4px 14px rgba(0,0,0,.45); }
  .hint { padding:.4rem .7rem; color:var(--dim); font-size:12px; border-top:1px solid var(--line); }
  .legend { display:flex; gap:.7rem; font-size:11px; color:var(--dim); padding:.35rem .7rem; flex-wrap:wrap; }
  .dot { display:inline-block; width:9px; height:9px; border-radius:50%; margin-right:.2rem; vertical-align:middle; }
  #roster { padding:.4rem .7rem; max-height:26%; overflow:auto; border-top:1px solid var(--line);
            display:flex; flex-wrap:wrap; gap:.15rem 1rem; align-content:flex-start; }
  #roster .beat { flex:0 0 auto; }
  .read { background:var(--bg); display:flex; flex-direction:column; min-height:0; }
  .tabs { display:flex; border-bottom:1px solid var(--line); background:var(--panel); }
  .tabs button { flex:0 0 auto; border:0; border-radius:0; background:transparent; color:var(--dim);
                 padding:.55rem 1rem; border-bottom:2px solid transparent; font-weight:600; }
  .tabs button.active { color:var(--ink); border-bottom-color:#1f6feb; }
  .scroll { overflow:auto; padding:1rem 1.3rem; flex:1; min-height:0; }
  .reading { max-width:760px; }
  .day { margin:1.1rem 0 .2rem; color:var(--philosopher); font-weight:700; letter-spacing:.3px; }
  .beat { padding:.12rem 0; }
  h2.name { margin:.2rem 0 0; } .subtitle { color:var(--dim); margin:.1rem 0 .8rem; }
  .tag { display:inline-block; background:#0d1117; border:1px solid var(--line); border-radius:999px;
         padding:.05rem .55rem; margin:.1rem .3rem .1rem 0; font-size:12px; color:var(--dim); }
  .fate { margin-top:.9rem; padding:.5rem .7rem; background:var(--panel); border-radius:8px; }
  .muted { color:var(--dim); }
  .hidden { display:none; }
  /* Final report (shown when a run finishes) */
  .report { border:1px solid var(--line); border-radius:10px; padding:.7rem .9rem;
            margin:0 0 1.1rem; background:linear-gradient(180deg,#161b22,#10151c); }
  .report .rhead { font-weight:700; margin-bottom:.5rem; }
  .report .rgrid { display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
                   gap:.2rem .9rem; font-size:14px; }
  .report .rverdict { margin-top:.6rem; padding-top:.5rem; border-top:1px solid var(--line);
                      color:var(--philosopher); font-weight:700; }
</style>
</head>
<body>
<header>
  <h1 id="title">🌍 Emergence&nbsp;Observatory</h1>
  <select id="persona" title="AI personality">
    <option value="claude" data-i18n="p_guardian">Guardian (Claude)</option>
    <option value="gemini" data-i18n="p_philosopher">Philosopher (Gemini)</option>
    <option value="gpt" data-i18n="p_idealist">Idealist (GPT)</option>
    <option value="grok" data-i18n="p_predator">Predator (Grok)</option>
  </select>
  <label><span data-i18n="seed">seed</span> <input id="seed" type="number" value="42" /></label>
  <select id="brain" title="who does the thinking">
    <option value="heuristic" data-i18n="b_heuristic">Heuristic (free)</option>
    <option value="local" data-i18n="b_local">Local LLM</option>
    <option value="api" data-i18n="b_api">Hosted API</option>
  </select>
  <label title="inner lives"><input id="rich" type="checkbox" checked /> <span data-i18n="rich">rich</span></label>
  <button class="primary" id="create" data-i18n="create">New world</button>
  <button id="step1" data-i18n="step1">+1 day</button>
  <button id="step5" data-i18n="step5">+5 days</button>
  <button id="play"></button>
  <select id="lang" title="language">
    <option value="ja">日本語</option>
    <option value="en">English</option>
  </select>
  <span id="status"></span>
</header>
<main>
  <div class="side">
    <div id="stage"><canvas id="town"></canvas></div>
    <div class="hint" data-i18n="hint">Click a citizen to possess them and read their life.</div>
    <div class="legend">
      <span><i class="dot" style="background:var(--guardian)"></i><span data-i18n="l_guardian">Guardian</span></span>
      <span><i class="dot" style="background:var(--philosopher)"></i><span data-i18n="l_philosopher">Philosopher</span></span>
      <span><i class="dot" style="background:var(--idealist)"></i><span data-i18n="l_idealist">Idealist</span></span>
      <span><i class="dot" style="background:var(--predator)"></i><span data-i18n="l_predator">Predator</span></span>
    </div>
    <div id="roster"></div>
  </div>
  <div class="read">
    <div class="tabs">
      <button data-tab="chronicle" class="active" data-i18n="tab_chronicle">📜 Chronicle</button>
      <button data-tab="citizen" data-i18n="tab_citizen">👤 Citizen</button>
      <button id="narrate" title="have the world's LLM write the chronicle as prose"
              style="margin-left:auto;color:var(--ink)" data-i18n="narrate">✨ Narrate</button>
    </div>
    <div id="chronicle" class="scroll"><div class="reading muted" data-i18n="emptyChronicle">Create a world to begin its chronicle.</div></div>
    <div id="citizen" class="scroll hidden"><div class="reading muted" data-i18n="emptyCitizen">Click a citizen in the town to possess them.</div></div>
  </div>
</main>
<div id="tip" class="tip hidden"></div>
<script>
const PC = { guardian:"#4aa3ff", philosopher:"#f0b429", idealist:"#3fb950", predator:"#f85149" };
// Facilities are landmarks — drawn LARGER than the little people standing on them.
const FAC = { farm:"🌾", forest:"🌲", mine:"⛏️", workshop:"🔧", market:"🏪", bank:"🏦",
  granary:"🏚️", library:"📖", plaza:"⛲", house:"🏠", town_hall:"🏛️", hospital:"🏥",
  police_station:"🚓", prison:"⛓️", temple:"⛪", monument:"🗿" };
const PROF = { farmer:"🌾", builder:"🔨", teacher:"📚", merchant:"🪙", doctor:"➕",
  guard:"🛡️", miner:"⛏️", librarian:"📖", smith:"⚒️", "council clerk":"⚖️", child:"🧸",
  mayor:"🎖️", priest:"⛪", banker:"🏦" };
const FLASH = { violence:"⚔️", theft:"🥷", arson:"🔥", death:"💀",
  trade:"🪙", service:"💚", birth:"✨", arrest:"🔗", praise:"👏" };
// Per-event particle burst: colours + style. Anything not listed just floats
// its emoji. Drawn as cheap procedural specks so the file stays asset-free.
const BURST = {
  violence:{n:14,col:["#fff","#f85149","#ffd0c0"],spd:3.2,life:600,grav:0.06,kind:"spark"},
  arson:   {n:18,col:["#ff7b00","#ffd24a","#7a7a7a"],spd:2.2,life:900,grav:-0.05,kind:"ember"},
  death:   {n:16,col:["#cdd6e0","#8b98a5"],spd:1.2,life:1100,grav:-0.04,kind:"soul"},
  theft:   {n:10,col:["#b7a98f","#8b98a5"],spd:1.8,life:500,grav:0.05,kind:"dust"},
  trade:   {n:10,col:["#ffd24a","#f0b429"],spd:1.8,life:700,grav:-0.07,kind:"coin"},
  service: {n:10,col:["#3fb950","#9af0b0"],spd:1.4,life:700,grav:-0.06,kind:"plus"},
  birth:   {n:14,col:["#fff","#ffe9a8","#9ad8ff"],spd:1.6,life:800,grav:-0.03,kind:"spark"},
};
const SHAKE = { violence:5, arson:6, death:4, rebellion:8 };  // screen-shake by event
// Facility names per language (so a tile is identifiable even if the emoji icon
// doesn't render on a given system).
const FACNAME = {
  farm:{en:"farm",ja:"農場"}, forest:{en:"forest",ja:"森"}, mine:{en:"mine",ja:"鉱山"},
  workshop:{en:"workshop",ja:"工房"}, market:{en:"market",ja:"市場"}, bank:{en:"bank",ja:"銀行"},
  granary:{en:"granary",ja:"倉庫"}, library:{en:"library",ja:"図書館"}, plaza:{en:"plaza",ja:"広場"},
  house:{en:"house",ja:"家"}, town_hall:{en:"town hall",ja:"役所"}, hospital:{en:"hospital",ja:"病院"},
  police_station:{en:"police",ja:"警察署"}, prison:{en:"prison",ja:"刑務所"},
  temple:{en:"temple",ja:"寺院"}, monument:{en:"monument",ja:"記念碑"} };
const facName = type => (FACNAME[type]||{})[lang] || type;
const $ = s => document.querySelector(s);

// --- i18n -----------------------------------------------------------------
const I18N = {
  en: {
    title_plain:"Emergence World — Observatory", title:"🌍 Emergence Observatory",
    p_guardian:"Guardian (Claude)", p_philosopher:"Philosopher (Gemini)",
    p_idealist:"Idealist (GPT)", p_predator:"Predator (Grok)",
    seed:"seed", b_heuristic:"Heuristic (free)", b_local:"Local LLM", b_api:"Hosted API",
    rich:"rich", create:"New world", step1:"+1 day", step5:"+5 days",
    play:"▶ Play", pause:"⏸ Pause", narrate:"✨ Narrate",
    hint:"Click a citizen to possess + follow · scroll to zoom · drag to pan · double-click to reset.",
    l_guardian:"Guardian", l_philosopher:"Philosopher", l_idealist:"Idealist", l_predator:"Predator",
    tab_chronicle:"📜 Chronicle", tab_citizen:"👤 Citizen",
    emptyChronicle:"Create a world to begin its chronicle.",
    emptyCitizen:"Click a citizen in the town to possess them.",
    running:"running…", quiet:"Quiet so far — step the world forward.",
    status:"Day {d}/{D} · {a}/{p} alive · {b} · {v}",
    day:"Day {n}", deceased:"(deceased)", uneventful:"An uneventful life.",
    allies:"Allies", foes:"Foes", marks:"Marks",
    noLLM:"This world has no LLM brain — pick Local LLM / Hosted API to narrate.",
    report_title:"Final report — day {n}", r_survivors:"Survivors", r_crimes:"Crimes",
    r_arrests:"Arrests", r_fines:"Fines", r_laws:"Bills passed", r_births:"Births",
    r_works:"Works created", r_trades:"Trades", r_gangs:"Gangs", r_rebellions:"Rebellions",
    r_faiths:"Faiths", r_verdict:"Verdict",
  },
  ja: {
    title_plain:"創発世界 — 観察所", title:"🌍 創発世界 観察所",
    p_guardian:"守護者 (Claude)", p_philosopher:"哲学者 (Gemini)",
    p_idealist:"理想家 (GPT)", p_predator:"捕食者 (Grok)",
    seed:"シード", b_heuristic:"ヒューリスティック（無料）", b_local:"ローカルLLM", b_api:"ホストAPI",
    rich:"内面", create:"新しい世界", step1:"＋1日", step5:"＋5日",
    play:"▶ 再生", pause:"⏸ 一時停止", narrate:"✨ 物語化",
    hint:"住人をクリックで憑依＋追従・ホイールでズーム・ドラッグで移動・ダブルクリックで戻す。",
    l_guardian:"守護者", l_philosopher:"哲学者", l_idealist:"理想家", l_predator:"捕食者",
    tab_chronicle:"📜 年代記", tab_citizen:"👤 住人",
    emptyChronicle:"世界を作ると年代記が始まります。",
    emptyCitizen:"街の住人をクリックして憑依してください。",
    running:"進行中…", quiet:"まだ静かです — 世界を先に進めてください。",
    status:"{d}/{D}日目 · 生存 {a}/{p} · {b} · {v}",
    day:"{n}日目", deceased:"（故人）", uneventful:"平穏な一生。",
    allies:"盟友", foes:"敵", marks:"刻まれたもの",
    noLLM:"この世界にはLLM脳がありません — ローカルLLM／ホストAPIを選ぶと物語化できます。",
    report_title:"最終レポート — {n}日目", r_survivors:"生存", r_crimes:"犯罪",
    r_arrests:"逮捕", r_fines:"罰金", r_laws:"可決法案", r_births:"出生",
    r_works:"創作物", r_trades:"取引", r_gangs:"ギャング", r_rebellions:"反乱",
    r_faiths:"信仰", r_verdict:"判定",
  },
};
let lang = localStorage.getItem("lang") || "ja";
function t(k){ const L=I18N[lang]||I18N.en; return (k in L)?L[k]:(I18N.en[k]??k); }
function fmt(k, map){ return t(k).replace(/\{(\w+)\}/g, (_,n)=> (n in map)? map[n] : `{${n}}`); }
let lastState = null;
function applyI18n(){
  document.documentElement.lang = lang;
  document.title = t("title_plain");
  document.getElementById("title").textContent = t("title");
  document.querySelectorAll("[data-i18n]").forEach(el=>{ el.textContent = t(el.dataset.i18n); });
  $("#play").textContent = playing ? t("pause") : t("play");
  $("#lang").value = lang;
  if(lastState) renderStatus(lastState);
  if(world){ loadChronicle(); if(selected) possess(selected); }
}

let world=null, agents=[], facilities=[], selected=null, playing=false, es=null;
const disp = new Map();      // id -> {x,y} smoothly-tweened display position (grid coords)
let flashes = [];            // {x,y,emoji,t0} floating event markers (grid coords)
let parts = [];              // {x,y,vx,vy,t0,life,col,kind} particle specks (pixel coords)
let shake = 0;               // current screen-shake magnitude (decays each frame)
let animing = false;

async function api(method, path, body) {
  const opt={method,headers:{}}; if(body!==undefined){opt.headers["Content-Type"]="application/json";opt.body=JSON.stringify(body);}
  const r=await fetch(path,opt); const d=await r.json(); if(!r.ok) throw new Error(d.error||r.statusText); return d;
}
function esc(s){const d=document.createElement("div");d.textContent=s==null?"":String(s);return d.innerHTML;}

// --- the town (the hero view) --------------------------------------------
const canvas=$("#town"), ctx=canvas.getContext("2d");
let baseCell=10, cell=10;    // baseCell = fit-to-stage; cell = baseCell * zoom
// Camera: zoom + pan (px,py are the on-screen origin of grid cell 0,0), with an
// optional followed citizen the view keeps centred.
const cam = { zoom:1, px:0, py:0, follow:null };
const MAXZOOM=5;
function fit(){ const r=$("#stage").getBoundingClientRect();
  const dpr=window.devicePixelRatio||1;
  canvas.width=r.width*dpr; canvas.height=r.height*dpr;
  canvas.style.width=r.width+"px"; canvas.style.height=r.height+"px";
  ctx.setTransform(dpr,0,0,dpr,0,0);
  if(world) recenter();   // keep zoom, re-centre for the new size
  draw(); }
function geom(){ const W=canvas.clientWidth, H=canvas.clientHeight;
  baseCell=Math.min(W/world.width, H/world.height); cell=baseCell*cam.zoom; }
const gx=x=>cam.px+(x+0.5)*cell, gy=y=>cam.py+(y+0.5)*cell;
function recenter(){ const W=canvas.clientWidth, H=canvas.clientHeight;
  baseCell=Math.min(W/world.width, H/world.height); cell=baseCell*cam.zoom;
  cam.px=(W-cell*world.width)/2; cam.py=(H-cell*world.height)/2; }
function resetView(){ cam.zoom=1; cam.follow=null; recenter(); }
// Keep the followed citizen gently centred (called each animation frame).
function followCam(){ if(!cam.follow) return;
  const a=agents.find(x=>x.id===cam.follow); if(!a){ cam.follow=null; return; }
  const p=disp.get(a.id)||a, W=canvas.clientWidth, H=canvas.clientHeight;
  const tpx=W/2-(p.x+0.5)*cell, tpy=H/2-(p.y+0.5)*cell;
  cam.px+=(tpx-cam.px)*0.12; cam.py+=(tpy-cam.py)*0.12; }

// --- procedural world dressing: terrain, seasons, day/night, weather --------
// Everything here is drawn from code (no image assets), so the observatory stays
// a single dependency-free file. Terrain is deterministic per world seed.
function mulberry32(a){ return function(){ a|=0; a=a+0x6D2B79F5|0;
  let t=Math.imul(a^a>>>15,1|a); t=t+Math.imul(t^t>>>7,61|t)^t;
  return ((t^t>>>14)>>>0)/4294967296; }; }
function makeNoise(seed){            // smooth value noise on a lattice
  const r=mulberry32(seed), G=64, g=new Float32Array(G*G);
  for(let i=0;i<g.length;i++) g[i]=r();
  const at=(x,y)=>g[((y%G+G)%G)*G+((x%G+G)%G)];
  const sm=t=>t*t*(3-2*t);
  return (x,y)=>{ const xi=Math.floor(x),yi=Math.floor(y),xf=x-xi,yf=y-yi;
    const a=at(xi,yi),b=at(xi+1,yi),c=at(xi,yi+1),d=at(xi+1,yi+1);
    const u=sm(xf),v=sm(yf);
    return (a*(1-u)+b*u)*(1-v)+(c*(1-u)+d*u)*v; };
}
let terrain=null, terrainKey="";    // {type,shade} per cell + a path overlay
function buildTerrain(){
  if(!world) return;
  const key=`${world.id}:${world.width}x${world.height}`;
  if(key===terrainKey && terrain) return; terrainKey=key;
  const seed=(lastState&&lastState.config&&lastState.config.seed)||42;
  const elev=makeNoise(seed*2+1), moist=makeNoise(seed*7+3), fz=0.16;
  const W=world.width, H=world.height, cells=[];
  for(let y=0;y<H;y++){ const row=[];
    for(let x=0;x<W;x++){
      const e=elev(x*fz,y*fz), m=moist(x*fz+10,y*fz+10);
      let type;
      if(e<0.30) type="water";
      else if(e<0.36) type="sand";
      else if(e>0.74) type="rock";
      else type=m>0.62?"forest":"grass";    // damp ground reads lusher
      row.push({type, shade:(elev(x*0.9,y*0.9)-0.5)*0.10});
    }
    cells.push(row);
  }
  // Worn paths: trace from each facility toward the town centre so the place
  // reads as lived-in. Cells along the way become packed dirt.
  const path=new Set();
  if(facilities.length){
    const cx=facilities.reduce((s,f)=>s+f.x,0)/facilities.length;
    const cy=facilities.reduce((s,f)=>s+f.y,0)/facilities.length;
    for(const f of facilities){ let x=f.x,y=f.y;
      for(let i=0;i<64 && (Math.abs(x-cx)>0.5||Math.abs(y-cy)>0.5);i++){
        path.add(`${Math.round(x)},${Math.round(y)}`);
        x+=Math.sign(cx-x)*Math.min(1,Math.abs(cx-x));
        y+=Math.sign(cy-y)*Math.min(1,Math.abs(cy-y));
      }
    }
  }
  terrain={cells, path, W, H};
}
const SEASON_GROUND = {            // base grass tint per season (RGB)
  spring:[86,140,70], summer:[74,128,58], autumn:[150,116,52], winter:[206,214,224],
  _:[80,130,64] };
function envSeason(){ return (lastState&&lastState.environment&&lastState.environment.season)||"_"; }
function envWeather(){ return (lastState&&lastState.environment&&lastState.environment.weather)||null; }
function tintCell(type, shade){
  const s=envSeason(), grass=SEASON_GROUND[s]||SEASON_GROUND._;
  let c;
  if(type==="water")  c=[40,86,120];
  else if(type==="sand") c=[166,150,104];
  else if(type==="rock") c=[96,100,110];
  else if(type==="forest") c=[grass[0]*0.7|0,grass[1]*0.78|0,grass[2]*0.66|0];
  else c=grass.slice();
  // winter dusts everything but water with snow
  if(s==="winter" && type!=="water"){ c=[(c[0]+206)/2|0,(c[1]+214)/2|0,(c[2]+224)/2|0]; }
  const k=1+shade; return `rgb(${Math.min(255,c[0]*k)|0},${Math.min(255,c[1]*k)|0},${Math.min(255,c[2]*k)|0})`;
}
function drawTerrain(){
  if(!terrain) return; const o=cell*0.5;
  for(let y=0;y<terrain.H;y++) for(let x=0;x<terrain.W;x++){
    const t=terrain.cells[y][x];
    ctx.fillStyle=tintCell(t.type,t.shade);
    ctx.fillRect(gx(x)-o, gy(y)-o, cell+1, cell+1);
    if(terrain.path.has(`${x},${y}`) && t.type!=="water"){
      ctx.fillStyle="rgba(120,98,66,.5)";
      ctx.fillRect(gx(x)-o, gy(y)-o, cell+1, cell+1);
    }
  }
  // gentle water shimmer
  const sh=(Math.sin(performance.now()/700)+1)/2;
  for(let y=0;y<terrain.H;y++) for(let x=0;x<terrain.W;x++){
    if(terrain.cells[y][x].type!=="water") continue;
    ctx.fillStyle=`rgba(150,200,230,${0.05+0.05*((x+y+Math.floor(performance.now()/500))%3===0?sh:0)})`;
    ctx.fillRect(gx(x)-o, gy(y)-o, cell+1, cell*0.5);
  }
}
// Day/night: a slow real-time clock gives the world a living sky. Returns the
// darkness overlay colour + strength for the current moment.
const DAY_MS=90000;            // a full dawn->night cycle
function skyOverlay(){
  const p=(performance.now()%DAY_MS)/DAY_MS;            // 0..1 over the cycle
  // keyframes: 0 dawn, .25 noon, .5 dusk, .75 night
  const stops=[[0.00,[255,180,120,0.18]],[0.18,[255,255,255,0.0]],
               [0.50,[255,150,90,0.20]],[0.70,[20,28,70,0.42]],
               [0.95,[10,16,46,0.5]],[1.0,[255,180,120,0.18]]];
  let a=stops[0],b=stops[1];
  for(let i=0;i<stops.length-1;i++){ if(p>=stops[i][0]&&p<=stops[i+1][0]){a=stops[i];b=stops[i+1];break;} }
  const f=(p-a[0])/((b[0]-a[0])||1), c0=a[1],c1=b[1], mix=(i)=>c0[i]+(c1[i]-c0[i])*f;
  return `rgba(${mix(0)|0},${mix(1)|0},${mix(2)|0},${mix(3).toFixed(3)})`;
}
// 0 = day, 1 = deep night — drives warm window glow on the buildings.
function nightFactor(){
  const p=(performance.now()%DAY_MS)/DAY_MS;
  if(p<0.45) return 0;
  if(p<0.70) return (p-0.45)/0.25;
  if(p<0.92) return 1;
  return Math.max(0, 1-(p-0.92)/0.08);
}
// lighten/darken a #rrggbb colour by factor k
function shade(hex,k){ const n=parseInt(hex.slice(1),16);
  const r=Math.min(255,((n>>16)&255)*k)|0, g=Math.min(255,((n>>8)&255)*k)|0, b=Math.min(255,(n&255)*k)|0;
  return `rgb(${r},${g},${b})`; }
// Weather particles (rain / snow), spawned to match the sim's condition.
let wparts=[], wkind=null;
function syncWeather(){
  const cond=envWeather();
  const kind = /rain|storm/.test(cond||"")?"rain" : /snow/.test(cond||"")?"snow" : null;
  if(kind===wkind) return; wkind=kind; wparts=[];
  const n = kind==="rain"?160 : kind==="snow"?110 : 0;
  for(let i=0;i<n;i++) wparts.push({x:Math.random(),y:Math.random(),
    v:0.4+Math.random()*0.6, w:Math.random()*2-1});
}
function drawWeather(){
  if(!wkind||!wparts.length) return; const W=canvas.clientWidth,H=canvas.clientHeight;
  const dt=1/60;
  if(wkind==="rain"){ ctx.strokeStyle="rgba(170,200,235,.35)"; ctx.lineWidth=1;
    ctx.beginPath();
    for(const p of wparts){ const px=p.x*W, py=p.y*H;
      ctx.moveTo(px,py); ctx.lineTo(px+6, py+14);
      p.y+=p.v*dt*2.4; p.x+=0.02*dt; if(p.y>1.02){p.y=-0.02;p.x=Math.random();} }
    ctx.stroke();
  } else { ctx.fillStyle="rgba(240,246,255,.85)";
    for(const p of wparts){ const px=(p.x+Math.sin(performance.now()/900+p.w*6)*0.01)*W, py=p.y*H;
      ctx.beginPath(); ctx.arc(px,py,cell*0.06+0.6,0,7); ctx.fill();
      p.y+=p.v*dt*0.5; if(p.y>1.02){p.y=-0.02;p.x=Math.random();} }
  }
}
function drawVignette(){
  const W=canvas.clientWidth,H=canvas.clientHeight;
  const g=ctx.createRadialGradient(W/2,H*0.46,Math.min(W,H)*0.30, W/2,H*0.5,Math.max(W,H)*0.75);
  g.addColorStop(0,"rgba(0,0,0,0)"); g.addColorStop(1,"rgba(0,0,0,.45)");
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
}

function drawFacility(f){
  const x=gx(f.x), y=gy(f.y), s=cell*0.92;
  ctx.save();
  // a grounding shadow, then a raised stone plinth with a soft top-light so the
  // landmark sits on the land rather than floating as a glyph
  const t=cell*0.46;
  ctx.fillStyle="rgba(0,0,0,.30)";
  ctx.beginPath(); ctx.ellipse(x, y+t*0.72, t*0.95, t*0.42, 0, 0, 7); ctx.fill();
  const pg=ctx.createLinearGradient(0,y-t,0,y+t);
  pg.addColorStop(0,"rgba(255,255,255,.14)"); pg.addColorStop(1,"rgba(0,0,0,.18)");
  ctx.fillStyle=pg; ctx.strokeStyle="rgba(255,255,255,.10)";
  roundRect(x-t,y-t,t*2,t*2,cell*0.18); ctx.fill(); ctx.stroke();
  // warm lit windows after dusk (not on open-land sites) — the town glows at night
  const nf=nightFactor();
  if(nf>0.05 && !["forest","farm","mine","plaza"].includes(f.type)){
    ctx.fillStyle=`rgba(255,198,96,${(0.20+0.55*nf).toFixed(3)})`;
    const ww=t*0.24, wy=y+t*0.12;
    ctx.fillRect(x-t*0.44, wy, ww, ww*0.85);
    ctx.fillRect(x+t*0.20, wy, ww, ww*0.85);
  }
  ctx.font=`${Math.round(s)}px system-ui`; ctx.textAlign="center"; ctx.textBaseline="middle";
  ctx.fillText(FAC[f.type]||"🏢", x, y+1);
  // A small name label so you can always tell which facility is which (and
  // where an event happened) — independent of whether the emoji renders.
  if(cell>=16){ ctx.font=`${Math.max(8,Math.round(cell*0.26))}px system-ui`;
    ctx.fillStyle="rgba(230,237,243,.72)"; ctx.textBaseline="top";
    ctx.fillText(facName(f.type), x, y+cell*0.30); }
  ctx.restore();
}

// A "Game of Life" peg figure: round head + trapezoid body, kept smaller than
// the facilities it stands on (per the look the user signed off on).
function drawPeg(x,y,persona,prof,alive,sel,moving){
  const col=PC[persona]||"#9aa";
  const h=cell*0.62;                  // total figure height (< facility tile)
  const headR=h*0.22, bodyH=h*0.5, topW=h*0.22, botW=h*0.4;
  const groundY=y+h*0.42;             // planted feet
  const bob=(alive&&moving)?Math.abs(Math.sin(performance.now()/110+x))*cell*0.06:0;
  const baseY=groundY-bob;            // the figure hops as it walks
  const bodyTopY=baseY-bodyH, headCY=bodyTopY-headR*0.7;
  ctx.save();
  if(!alive) ctx.globalAlpha=0.45;
  // ground shadow (shrinks a touch on the up-beat of a step)
  ctx.fillStyle="rgba(0,0,0,.35)";
  ctx.beginPath(); ctx.ellipse(x, groundY+headR*0.18, botW*0.62*(1-bob/cell*0.6), headR*0.32, 0, 0, 7); ctx.fill();
  // selection: a soft pulsing ring
  if(sel){ const pulse=(0.55+0.45*Math.sin(performance.now()/240)).toFixed(2);
    ctx.strokeStyle=`rgba(255,255,255,${pulse})`; ctx.lineWidth=Math.max(1.5,cell*0.06);
    ctx.beginPath(); ctx.arc(x, headCY+bodyH*0.32, h*0.62, 0, 7); ctx.stroke(); }
  // trapezoid body with a vertical shading gradient (persona colour)
  const base=alive?col:"#3a3f47";
  const bg=ctx.createLinearGradient(0,bodyTopY,0,baseY);
  bg.addColorStop(0, shade(base,1.28)); bg.addColorStop(1, shade(base,0.68));
  ctx.fillStyle=bg;
  ctx.beginPath();
  ctx.moveTo(x-topW, bodyTopY); ctx.lineTo(x+topW, bodyTopY);
  ctx.lineTo(x+botW, baseY);    ctx.lineTo(x-botW, baseY);
  ctx.closePath(); ctx.fill();
  // head with a small top-left highlight
  const hg=ctx.createRadialGradient(x-headR*0.3,headCY-headR*0.3,headR*0.2, x,headCY,headR);
  hg.addColorStop(0, alive?"#ffe2c4":"#6b727b"); hg.addColorStop(1, alive?"#e3ad84":"#5b626b");
  ctx.fillStyle=hg;
  ctx.beginPath(); ctx.arc(x, headCY, headR, 0, 7); ctx.fill();
  ctx.restore();
  // profession emoji floating just above (only when cells are roomy enough)
  if(alive && cell>=20){ ctx.save(); ctx.globalAlpha=0.9;
    ctx.font=`${Math.round(headR*1.5)}px system-ui`; ctx.textAlign="center"; ctx.textBaseline="alphabetic";
    ctx.fillText(PROF[prof]||"🙂", x, headCY-headR*1.4); ctx.restore(); }
}
function roundRect(x,y,w,h,r){ ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }

function draw(){
  if(!world) return; geom(); buildTerrain();
  const W=canvas.clientWidth, H=canvas.clientHeight; ctx.clearRect(0,0,W,H);
  ctx.save();
  if(shake>0.2) ctx.translate((Math.random()*2-1)*shake, (Math.random()*2-1)*shake);
  drawTerrain();                                   // the land
  for(const f of facilities) drawFacility(f);      // landmarks
  // people, painted back-to-front so lower figures overlap correctly
  const order=agents.slice().sort((a,b)=>(disp.get(a.id)?.y??a.y)-(disp.get(b.id)?.y??b.y));
  for(const a of order){ const p=disp.get(a.id)||{x:a.x,y:a.y};
    const moving=Math.abs(p.x-a.x)>0.02||Math.abs(p.y-a.y)>0.02;
    drawPeg(gx(p.x), gy(p.y), a.persona, a.profession, a.alive, a.id===selected, moving); }
  // event flashes float up and fade
  const now=performance.now();
  for(const fl of flashes){ const t=(now-fl.t0)/900; if(t>=1) continue;
    ctx.save(); ctx.globalAlpha=1-t; ctx.font=`${Math.round(cell*0.9)}px system-ui`;
    ctx.textAlign="center"; ctx.textBaseline="middle";
    ctx.fillText(fl.emoji, gx(fl.x), gy(fl.y)-cell*0.6*t-cell*0.4); ctx.restore(); }
  drawParticles();                                 // event bursts (sparks/coins/…)
  drawWeather();                                   // rain / snow
  ctx.restore();
  ctx.fillStyle=skyOverlay(); ctx.fillRect(0,0,W,H);   // time-of-day tint
  drawVignette();
}

// A living world renders continuously (sky drifts, water shimmers, weather
// falls), so the loop runs while a world exists rather than only on movement.
function animate(){
  if(!world){ animing=false; return; }
  for(const a of agents){ let p=disp.get(a.id);
    if(!p){ p={x:a.x,y:a.y}; disp.set(a.id,p); }
    p.x+=(a.x-p.x)*0.18; p.y+=(a.y-p.y)*0.18; }
  followCam();
  flashes=flashes.filter(f=>performance.now()-f.t0<900);
  stepParticles();
  shake*=0.86; if(shake<0.2) shake=0;
  draw();
  requestAnimationFrame(animate);
}
function kick(){ if(!animing){ animing=true; requestAnimationFrame(animate); } }

// Particle bursts — cheap procedural specks spawned at an event's spot.
function spawnBurst(px,py,kind){
  const c=BURST[kind]; if(!c) return; const now=performance.now();
  for(let i=0;i<c.n;i++){ const a=Math.random()*Math.PI*2, sp=c.spd*(0.4+Math.random()*0.8);
    parts.push({x:px,y:py, vx:Math.cos(a)*sp, vy:Math.sin(a)*sp-(c.grav<0?c.spd*0.6:0),
      t0:now, life:c.life*(0.7+Math.random()*0.5), grav:c.grav,
      col:c.col[(Math.random()*c.col.length)|0], kind:c.kind}); }
}
function stepParticles(){ for(const p of parts){ p.x+=p.vx; p.y+=p.vy; p.vy+=p.grav; p.vx*=0.98; } }
function drawParticles(){
  const now=performance.now();
  parts=parts.filter(p=>now-p.t0<p.life);
  for(const p of parts){ const lifeF=1-(now-p.t0)/p.life;
    ctx.save(); ctx.globalAlpha=Math.max(0,lifeF);
    const sz=Math.max(1, cell*0.10*(p.kind==="soul"?1.4:1));
    ctx.fillStyle=p.col;
    if(p.kind==="spark"||p.kind==="ember"){ ctx.fillRect(p.x-sz*0.25,p.y-sz*0.25,sz*0.6,sz*0.6); }
    else { ctx.beginPath(); ctx.arc(p.x,p.y,sz*0.55,0,7); ctx.fill(); }
    ctx.restore(); }
}

function posOf(ev){
  if(Array.isArray(ev.pos)) return {x:ev.pos[0], y:ev.pos[1]};
  const id=ev.victim||ev.taker||ev.child||ev.payee||ev.agent||ev.offender
         ||ev.provider||ev.actor||ev.by||ev.maker||ev.target;
  const a=agents.find(x=>x.id===id); return a?{x:a.x,y:a.y}:null;
}
function flashEvents(list){
  for(const ev of list||[]){
    const p=posOf(ev); if(!p) continue;
    const emoji=FLASH[ev.kind];
    if(emoji) flashes.push({x:p.x,y:p.y,emoji,t0:performance.now()});
    if(BURST[ev.kind]) spawnBurst(gx(p.x), gy(p.y), ev.kind);
    if(SHAKE[ev.kind]) shake=Math.max(shake, SHAKE[ev.kind]);
  }
}

// Drag to pan, wheel to zoom (toward the cursor), click a citizen to possess +
// follow, double-click to reset the view. A small drag threshold separates a
// click (possess) from a pan.
let drag=null;   // {x,y,moved} while the mouse button is down
function nearestAgent(ev){ const r=canvas.getBoundingClientRect();
  const px=ev.clientX-r.left, py=ev.clientY-r.top;
  let best=null,bd=1e9; for(const a of agents){ const p=disp.get(a.id)||a;
    const d=Math.hypot(gx(p.x)-px, gy(p.y)-py); if(d<bd){bd=d;best=a;} }
  return {best, bd}; }
canvas.addEventListener("mousedown",ev=>{ if(!world) return;
  drag={x:ev.clientX,y:ev.clientY,moved:0}; canvas.classList.add("dragging"); });
window.addEventListener("mousemove",ev=>{
  if(!drag) return;
  const dx=ev.clientX-drag.x, dy=ev.clientY-drag.y;
  cam.px+=dx; cam.py+=dy; drag.x=ev.clientX; drag.y=ev.clientY;
  drag.moved+=Math.abs(dx)+Math.abs(dy); cam.follow=null; $("#tip").classList.add("hidden"); });
window.addEventListener("mouseup",ev=>{
  if(drag && drag.moved<5 && agents.length){      // a click, not a pan
    const {best,bd}=nearestAgent(ev); if(best && bd<cell*0.9) possess(best.id); }
  drag=null; canvas.classList.remove("dragging"); });
canvas.addEventListener("wheel",ev=>{ if(!world) return; ev.preventDefault();
  const r=canvas.getBoundingClientRect(), mx=ev.clientX-r.left, my=ev.clientY-r.top;
  const z0=cam.zoom; cam.zoom=Math.max(1,Math.min(MAXZOOM, cam.zoom*(ev.deltaY<0?1.12:1/1.12)));
  const k=cam.zoom/z0; cell=baseCell*cam.zoom;       // keep the point under the cursor fixed
  cam.px=mx-(mx-cam.px)*k; cam.py=my-(my-cam.py)*k; cam.follow=null; }, {passive:false});
canvas.addEventListener("dblclick",()=>{ if(world) resetView(); });
canvas.addEventListener("mousemove",ev=>{       // hover tooltip (when not panning)
  if(drag||!world||!agents.length){ return; }
  const tip=$("#tip"), {best,bd}=nearestAgent(ev);
  if(best && bd<cell*0.7){
    tip.innerHTML=`<b>${esc(best.name)}</b> · ${esc(best.profession)}`
      +`<br>⚡${Math.round(best.energy)} · 🪙${best.money}${best.alive?"":" · "+esc(t("deceased"))}`;
    tip.style.left=(ev.clientX+12)+"px"; tip.style.top=(ev.clientY+12)+"px";
    tip.classList.remove("hidden");
  } else tip.classList.add("hidden"); });
canvas.addEventListener("mouseleave",()=>$("#tip").classList.add("hidden"));

function roster(){
  $("#roster").innerHTML = agents.map(a=>
    `<div class="beat" style="cursor:pointer;${a.alive?'':'opacity:.5'}" data-id="${a.id}">
       <i class="dot" style="background:${PC[a.persona]||'#9aa'}"></i>${esc(a.name)}
       <span class="muted">${esc(a.profession)}</span></div>`).join("");
  document.querySelectorAll("#roster [data-id]").forEach(el=>el.onclick=()=>possess(el.dataset.id));
}

const WEATHER_ICON = { clear:"☀️", sunny:"☀️", cloudy:"☁️", overcast:"☁️",
  rain:"🌧️", storm:"⛈️", snow:"❄️", fog:"🌫️", wind:"💨", windy:"💨" };
function renderStatus(st){
  const v = st.finished ? st.verdict : t("running");
  let line = fmt("status", {d:st.day, D:st.config.days,
    a:st.living, p:st.population, b:st.brain, v});
  if(st.environment){ const e=st.environment;
    const wx=(WEATHER_ICON[e.weather]||""); line = `${wx} ${e.season} · ` + line; }
  $("#status").textContent = line;
}
function applyState(st){
  world={id:st.world_id||world.id,width:st.width,height:st.height};
  agents=st.agents; facilities=st.facilities; lastState=st;
  // prune display state for agents that no longer exist
  for(const id of [...disp.keys()]) if(!agents.some(a=>a.id===id)) disp.delete(id);
  flashEvents(st.new_events);
  syncWeather();
  renderStatus(st);
  roster(); kick(); draw();
  if(st.finished&&playing) stopPlay();
}

// --- the story (read on the right) ---------------------------------------
let narrative = null;   // cached LLM prose for the current chronicle, if any
// A final report once the run ends: how the 15 days turned out.
function reportCard(st){
  if(!st || !st.finished) return "";
  const m = st.metrics || {}, rows = [];
  const add=(k,v)=>rows.push(`<div><span class="muted">${esc(t(k))}</span> <b>${esc(v)}</b></div>`);
  add("r_survivors", `${m.survivors}/${m.population}`);
  if(m.crimes_total){ const cb=m.crimes_by_type||{};
    const parts=Object.entries(cb).map(([k,v])=>`${v} ${k}`).join(", ");
    add("r_crimes", parts?`${m.crimes_total} (${parts})`:m.crimes_total); }
  if(m.arrests) add("r_arrests", m.arrests);
  if(m.fines_collected) add("r_fines", m.fines_collected);
  if(m.proposals_total) add("r_laws", `${m.proposals_passed}/${m.proposals_total}`);
  if(m.births) add("r_births", m.births);
  if(m.works_created) add("r_works", m.works_created);
  if(m.trades) add("r_trades", m.trades);
  if(m.gangs_formed) add("r_gangs", m.gangs_formed);
  if(m.rebellions) add("r_rebellions", m.rebellions);
  if(m.religions_founded) add("r_faiths", m.religions_founded);
  return `<div class="report"><div class="rhead">${esc(fmt("report_title",{n:st.day}))}</div>`
       + `<div class="rgrid">${rows.join("")}</div>`
       + `<div class="rverdict">${esc(t("r_verdict"))}: ${esc(st.verdict||"")}</div></div>`;
}
async function loadChronicle(){
  if(!world)return; const c=await api("GET",`/api/worlds/${world.id}/chronicle?lang=${lang}`);
  const days = c.days.map(d=>
    `<div class="day">${fmt("day",{n:d.day})}</div>`+d.beats.map(b=>`<div class="beat">${esc(b)}</div>`).join("")
  ).join("") || `<div class="muted">${esc(t("quiet"))}</div>`;
  const prose = narrative
    ? `<div class="fate" style="white-space:pre-wrap;margin:0 0 1rem">${esc(narrative)}</div>` : "";
  const pane=$("#chronicle"); pane.innerHTML=`<div class="reading">${reportCard(lastState)}${prose}${days}</div>`;
  pane.scrollTop = lastState && lastState.finished ? 0 : pane.scrollHeight;
}
async function narrateChronicle(){
  if(!world)return;
  const btn=$("#narrate"); btn.disabled=true; btn.textContent="✨ …";
  try{
    const c=await api("GET",`/api/worlds/${world.id}/chronicle?narrate=1&lang=${lang}`);
    narrative = c.narrative;   // null on a heuristic world (no LLM)
    await loadChronicle(); showTab("chronicle");
    if(!narrative) alert(t("noLLM"));
  } finally { btn.disabled=false; btn.textContent=t("narrate"); }
}
async function possess(aid){
  selected=aid; cam.follow=aid; showTab("citizen"); draw();
  const s=await api("GET",`/api/worlds/${world.id}/agents/${aid}/story?lang=${lang}`);
  const beats=(s.beats||[]).map(b=>`<div class="beat">${esc(b)}</div>`).join("")||`<div class="muted">${esc(t("uneventful"))}</div>`;
  const tags=t2=>t2&&t2.length?t2.map(x=>`<span class="tag">${esc(x)}</span>`).join(""):"";
  $("#citizen").innerHTML=`<div class="reading">
    <h2 class="name">${esc(s.name)} ${s.alive?"":`<span class='muted'>${esc(t("deceased"))}</span>`}</h2>
    <div class="subtitle">${esc(s.subtitle)}</div>
    ${beats}
    ${s.allies&&s.allies.length?`<p><b>${esc(t("allies"))}:</b> ${tags(s.allies)}</p>`:""}
    ${s.foes&&s.foes.length?`<p><b>${esc(t("foes"))}:</b> ${tags(s.foes)}</p>`:""}
    ${s.beliefs&&s.beliefs.length?`<p><b>${esc(t("marks"))}:</b> ${tags(s.beliefs)}</p>`:""}
    <div class="fate">${esc(s.fate)}</div>
  </div>`;
}
function showTab(name){
  document.querySelectorAll(".tabs button[data-tab]").forEach(b=>b.classList.toggle("active",b.dataset.tab===name));
  $("#chronicle").classList.toggle("hidden",name!=="chronicle");
  $("#citizen").classList.toggle("hidden",name!=="citizen");
}
document.querySelectorAll(".tabs button[data-tab]").forEach(b=>b.onclick=()=>showTab(b.dataset.tab));

// --- controls -------------------------------------------------------------
async function createWorld(){
  stopPlay();
  const body={persona:$("#persona").value,seed:+$("#seed").value,days:15,
              rich:$("#rich").checked,brain:$("#brain").value,
              environment:true};   // seasons + weather drive the world's sky/look
  const st=await api("POST","/api/worlds",body);
  world={id:st.world_id,width:st.width,height:st.height}; selected=null; narrative=null;
  resetView();
  disp.clear(); flashes=[];
  $("#citizen").innerHTML=`<div class="reading muted">${esc(t("emptyCitizen"))}</div>`;
  applyState(st); await loadChronicle(); showTab("chronicle");
}
async function step(days){
  if(!world)return; const st=await api("POST",`/api/worlds/${world.id}/step?days=${days}&lang=${lang}`);
  narrative=null;  // the prose described an earlier day; re-narrate on demand
  applyState(st); await loadChronicle(); if(selected) possess(selected);
}
function togglePlay(){ playing?stopPlay():startPlay(); }
function startPlay(){
  if(!world)return; playing=true; $("#play").textContent=t("pause"); narrative=null;
  // Live SSE playback: one frame per simulated day, pushed by the server.
  es=new EventSource(`/api/worlds/${world.id}/stream?days=30&lang=${lang}`);
  es.onmessage=ev=>{ const st=JSON.parse(ev.data); applyState(st);
    loadChronicle(); if(st.finished) stopPlay(); };
  es.onerror=()=>stopPlay();
}
function stopPlay(){ playing=false; $("#play").textContent=t("play");
  if(es){es.close();es=null;} }

$("#create").onclick=()=>createWorld().catch(e=>alert(e.message));
$("#step1").onclick=()=>step(1).catch(e=>alert(e.message));
$("#step5").onclick=()=>step(5).catch(e=>alert(e.message));
$("#play").onclick=togglePlay;
$("#narrate").onclick=()=>narrateChronicle().catch(e=>alert(e.message));
$("#lang").onchange=e=>{ lang=e.target.value; localStorage.setItem("lang",lang); applyI18n(); };
window.addEventListener("resize",fit);
applyI18n(); fit(); createWorld().catch(()=>{});
</script>
</body>
</html>
