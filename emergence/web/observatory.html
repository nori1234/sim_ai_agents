<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Emergence World — Observatory</title>
<style>
  :root { --bg:#0e1116; --panel:#161b22; --line:#272e38; --ink:#e6edf3; --dim:#8b98a5;
          --guardian:#4aa3ff; --philosopher:#f0b429; --idealist:#3fb950; --predator:#f85149; }
  * { box-sizing: border-box; }
  body { margin:0; font:15px/1.6 system-ui,-apple-system,"Segoe UI",sans-serif;
         background:var(--bg); color:var(--ink); }
  header { display:flex; gap:.6rem; align-items:center; flex-wrap:wrap;
           padding:.6rem .9rem; background:var(--panel); border-bottom:1px solid var(--line); }
  header h1 { font-size:15px; margin:0 .6rem 0 0; font-weight:700; }
  select, input, button { font:inherit; color:var(--ink); background:#0d1117;
           border:1px solid var(--line); border-radius:6px; padding:.3rem .5rem; }
  input[type=number] { width:5rem; } button { cursor:pointer; }
  button:hover { border-color:#3d4350; } button.primary { background:#1f6feb; border-color:#1f6feb; }
  #status { margin-left:auto; color:var(--dim); font-size:13px; }
  /* Story is the lead; the map is a supporting strip. */
  main { display:grid; grid-template-columns: 300px 1fr; gap:1px; background:var(--line);
         height: calc(100vh - 52px); }
  .side { background:var(--panel); display:flex; flex-direction:column; min-height:0; }
  #stage { position:relative; height:300px; background:var(--bg); border-bottom:1px solid var(--line); }
  #town { display:block; width:100%; height:100%; }
  .hint { padding:.4rem .7rem; color:var(--dim); font-size:12px; }
  .read { background:var(--bg); display:flex; flex-direction:column; min-height:0; }
  .tabs { display:flex; border-bottom:1px solid var(--line); background:var(--panel); }
  .tabs button { flex:0 0 auto; border:0; border-radius:0; background:transparent; color:var(--dim);
                 padding:.55rem 1rem; border-bottom:2px solid transparent; font-weight:600; }
  .tabs button.active { color:var(--ink); border-bottom-color:#1f6feb; }
  .scroll { overflow:auto; padding:1rem 1.3rem; flex:1; min-height:0; }
  .reading { max-width:760px; }
  .day { margin:1.1rem 0 .2rem; color:var(--philosopher); font-weight:700; letter-spacing:.3px; }
  .beat { padding:.12rem 0; }
  .legend { display:flex; gap:.7rem; font-size:11px; color:var(--dim); padding:.35rem .7rem; flex-wrap:wrap; }
  .dot { display:inline-block; width:9px; height:9px; border-radius:50%; margin-right:.2rem; vertical-align:middle; }
  h2.name { margin:.2rem 0 0; } .subtitle { color:var(--dim); margin:.1rem 0 .8rem; }
  .tag { display:inline-block; background:#0d1117; border:1px solid var(--line); border-radius:999px;
         padding:.05rem .55rem; margin:.1rem .3rem .1rem 0; font-size:12px; color:var(--dim); }
  .fate { margin-top:.9rem; padding:.5rem .7rem; background:var(--panel); border-radius:8px; }
  .muted { color:var(--dim); }
</style>
</head>
<body>
<header>
  <h1>🌍 Emergence&nbsp;Observatory</h1>
  <select id="persona" title="AI personality">
    <option value="claude">Guardian (Claude)</option>
    <option value="gemini">Philosopher (Gemini)</option>
    <option value="gpt">Idealist (GPT)</option>
    <option value="grok">Predator (Grok)</option>
  </select>
  <label>seed <input id="seed" type="number" value="42" /></label>
  <select id="brain" title="who does the thinking">
    <option value="heuristic">Heuristic (free)</option>
    <option value="local">Local LLM</option>
    <option value="api">Hosted API</option>
  </select>
  <label title="inner lives"><input id="rich" type="checkbox" checked /> rich</label>
  <button class="primary" id="create">New world</button>
  <button id="step1">+1 day</button>
  <button id="step5">+5 days</button>
  <button id="play">▶ Play</button>
  <span id="status"></span>
</header>
<main>
  <div class="side">
    <div id="stage"><canvas id="town"></canvas></div>
    <div class="hint">Click a citizen to read their life.</div>
    <div class="legend">
      <span><i class="dot" style="background:var(--guardian)"></i>Guardian</span>
      <span><i class="dot" style="background:var(--philosopher)"></i>Philosopher</span>
      <span><i class="dot" style="background:var(--idealist)"></i>Idealist</span>
      <span><i class="dot" style="background:var(--predator)"></i>Predator</span>
    </div>
    <div id="roster" class="scroll" style="padding:.5rem .7rem;"></div>
  </div>
  <div class="read">
    <div class="tabs">
      <button data-tab="chronicle" class="active">📜 Chronicle</button>
      <button data-tab="citizen">👤 Citizen</button>
      <button id="narrate" title="have the world's LLM write the chronicle as prose"
              style="margin-left:auto;color:var(--ink)">✨ Narrate</button>
    </div>
    <div id="chronicle" class="scroll"><div class="reading muted">Create a world to begin its chronicle.</div></div>
    <div id="citizen" class="scroll hidden"><div class="reading muted">Click a citizen in the town.</div></div>
  </div>
</main>
<script>
const PC = { guardian:"#4aa3ff", philosopher:"#f0b429", idealist:"#3fb950", predator:"#f85149" };
const $ = s => document.querySelector(s);
let world=null, agents=[], facilities=[], selected=null, playing=false, timer=null, es=null;

async function api(method, path, body) {
  const opt={method,headers:{}}; if(body!==undefined){opt.headers["Content-Type"]="application/json";opt.body=JSON.stringify(body);}
  const r=await fetch(path,opt); const d=await r.json(); if(!r.ok) throw new Error(d.error||r.statusText); return d;
}
function esc(s){const d=document.createElement("div");d.textContent=s==null?"":String(s);return d.innerHTML;}

// --- town strip (context + click to possess) ---
const canvas=$("#town"), ctx=canvas.getContext("2d");
function fit(){const r=$("#stage").getBoundingClientRect();canvas.width=r.width;canvas.height=r.height;draw();}
function draw(){
  if(!world)return; const W=canvas.width,H=canvas.height; ctx.clearRect(0,0,W,H);
  const cw=W/world.width, ch=H/world.height;
  for(const f of facilities){const x=(f.x+.5)*cw,y=(f.y+.5)*ch;ctx.fillStyle="#1c232d";ctx.fillRect(x-cw*.45,y-ch*.45,cw*.9,ch*.9);}
  for(const a of agents){const x=(a.x+.5)*cw,y=(a.y+.5)*ch;ctx.beginPath();ctx.arc(x,y,Math.max(3,Math.min(cw,ch)*.34),0,7);
    ctx.fillStyle=a.alive?(PC[a.persona]||"#9aa"):"#3a3f47";ctx.globalAlpha=a.alive?1:.5;ctx.fill();ctx.globalAlpha=1;
    if(a.id===selected){ctx.lineWidth=2;ctx.strokeStyle="#fff";ctx.stroke();}}
}
canvas.addEventListener("click",ev=>{
  if(!world||!agents.length)return; const r=canvas.getBoundingClientRect();
  const cw=canvas.width/world.width, ch=canvas.height/world.height;
  const gx=(ev.clientX-r.left)/cw, gy=(ev.clientY-r.top)/ch;
  let best=null,bd=9; for(const a of agents){const d=Math.hypot(a.x+.5-gx,a.y+.5-gy);if(d<bd){bd=d;best=a;}}
  if(best&&bd<1.4) possess(best.id);
});

function roster(){
  $("#roster").innerHTML = agents.map(a=>
    `<div class="beat" style="cursor:pointer;${a.alive?'':'opacity:.5'}" data-id="${a.id}">
       <i class="dot" style="background:${PC[a.persona]||'#9aa'}"></i>${esc(a.name)}
       <span class="muted">${esc(a.profession)}</span></div>`).join("");
  document.querySelectorAll("#roster [data-id]").forEach(el=>el.onclick=()=>possess(el.dataset.id));
}

function applyState(st){
  world={id:st.world_id||world.id,width:st.width,height:st.height};
  agents=st.agents; facilities=st.facilities;
  const v = st.finished ? st.verdict : "running…";
  $("#status").textContent=`Day ${st.day}/${st.config.days} · ${st.living}/${st.population} alive · ${st.brain} · ${v}`;
  draw(); roster();
  if(st.finished&&playing) togglePlay();
}

// --- the story (lead) ---
let narrative = null;   // cached LLM prose for the current chronicle, if any
async function loadChronicle(){
  if(!world)return; const c=await api("GET",`/api/worlds/${world.id}/chronicle`);
  const days = c.days.map(d=>
    `<div class="day">Day ${d.day}</div>`+d.beats.map(b=>`<div class="beat">${esc(b)}</div>`).join("")
  ).join("") || `<div class="muted">Quiet so far — step the world forward.</div>`;
  const prose = narrative
    ? `<div class="fate" style="white-space:pre-wrap;margin:0 0 1rem">${esc(narrative)}</div>` : "";
  const pane=$("#chronicle"); pane.innerHTML=`<div class="reading">${prose}${days}</div>`;
  pane.scrollTop=pane.scrollHeight;
}
async function narrateChronicle(){
  if(!world)return;
  const btn=$("#narrate"); btn.disabled=true; btn.textContent="✨ …";
  try{
    const c=await api("GET",`/api/worlds/${world.id}/chronicle?narrate=1`);
    narrative = c.narrative;   // null on a heuristic world (no LLM)
    await loadChronicle(); showTab("chronicle");
    if(!narrative) alert("This world has no LLM brain — pick Local LLM / Hosted API to narrate.");
  } finally { btn.disabled=false; btn.textContent="✨ Narrate"; }
}
async function possess(aid){
  selected=aid; showTab("citizen"); draw();
  const s=await api("GET",`/api/worlds/${world.id}/agents/${aid}/story`);
  const beats=(s.beats||[]).map(b=>`<div class="beat">${esc(b)}</div>`).join("")||`<div class="muted">An uneventful life.</div>`;
  const tags=t=>t&&t.length?t.map(x=>`<span class="tag">${esc(x)}</span>`).join(""):"";
  $("#citizen").innerHTML=`<div class="reading">
    <h2 class="name">${esc(s.name)} ${s.alive?"":"<span class='muted'>(deceased)</span>"}</h2>
    <div class="subtitle">${esc(s.subtitle)}</div>
    ${beats}
    ${s.allies&&s.allies.length?`<p><b>Allies:</b> ${tags(s.allies)}</p>`:""}
    ${s.foes&&s.foes.length?`<p><b>Foes:</b> ${tags(s.foes)}</p>`:""}
    ${s.beliefs&&s.beliefs.length?`<p><b>Marks:</b> ${tags(s.beliefs)}</p>`:""}
    <div class="fate">${esc(s.fate)}</div>
  </div>`;
}
function showTab(name){
  document.querySelectorAll(".tabs button").forEach(b=>b.classList.toggle("active",b.dataset.tab===name));
  $("#chronicle").classList.toggle("hidden",name!=="chronicle");
  $("#citizen").classList.toggle("hidden",name!=="citizen");
}
document.querySelectorAll(".tabs button").forEach(b=>b.onclick=()=>showTab(b.dataset.tab));

// --- controls ---
async function createWorld(){
  stopPlay();
  const body={persona:$("#persona").value,seed:+$("#seed").value,days:15,
              rich:$("#rich").checked,brain:$("#brain").value};
  const st=await api("POST","/api/worlds",body);
  world={id:st.world_id,width:st.width,height:st.height}; selected=null; narrative=null;
  $("#citizen").innerHTML=`<div class="reading muted">Click a citizen in the town.</div>`;
  applyState(st); await loadChronicle(); showTab("chronicle");
}
async function step(days){
  if(!world)return; const st=await api("POST",`/api/worlds/${world.id}/step?days=${days}`);
  narrative=null;  // the prose described an earlier day; re-narrate on demand
  applyState(st); await loadChronicle(); if(selected) possess(selected);
}
function togglePlay(){ playing?stopPlay():startPlay(); }
function startPlay(){
  if(!world)return; playing=true; $("#play").textContent="⏸ Pause"; narrative=null;
  // Live SSE playback: one frame per simulated day, pushed by the server.
  es=new EventSource(`/api/worlds/${world.id}/stream?days=30`);
  es.onmessage=ev=>{ const st=JSON.parse(ev.data); applyState(st);
    loadChronicle(); if(st.finished) stopPlay(); };
  es.onerror=()=>stopPlay();
}
function stopPlay(){ playing=false; $("#play").textContent="▶ Play";
  if(es){es.close();es=null;} if(timer){clearInterval(timer);timer=null;} }

$("#create").onclick=()=>createWorld().catch(e=>alert(e.message));
$("#step1").onclick=()=>step(1).catch(e=>alert(e.message));
$("#step5").onclick=()=>step(5).catch(e=>alert(e.message));
$("#play").onclick=togglePlay;
$("#narrate").onclick=()=>narrateChronicle().catch(e=>alert(e.message));
window.addEventListener("resize",fit);
fit(); createWorld().catch(()=>{});
</script>
</body>
</html>
